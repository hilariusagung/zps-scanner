<style>
/* Custom Notification Modal — pakai token dari CSS.html */
#notifModal .modal-content {
  border-radius : var(--radius-xl, 20px) !important;
  animation     : slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.notif-icon {
  width         : 80px; height: 80px;
  border-radius : var(--radius-pill, 9999px);
  display       : flex; align-items: center; justify-content: center;
  margin        : 0 auto;
  transition    : all var(--transition-base, 300ms ease);
}
.notif-icon.success { background: var(--color-success-subtle, #d1e7dd); color: var(--color-success, #198754); }
.notif-icon.error   { background: var(--color-danger-subtle,  #f8d7da); color: var(--color-danger,  #DC2626); }
.notif-icon.warning { background: var(--color-warning-subtle, #fff3cd); color: var(--color-warning, #D97706); }
.notif-icon.loading { background: var(--color-primary-subtle, #e3f0ff); color: var(--color-primary, #0d6efd); }
.notif-icon.loading i { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
